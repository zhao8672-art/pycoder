version: "3.9"

services:
  pycoder:
    build: .
    ports:
      - "8423:8423"
    environment:
      - PYCODER_API_KEY=${PYCODER_API_KEY:-}
      - PYCODER_CLOUD_JWT_SECRET=${PYCODER_CLOUD_JWT_SECRET:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PYCODER_PORT=8423
      - PYCODER_HOME=/data
    volumes:
      - pycoder_data:/data
      - ${HOST_WORKSPACE:-./workspace}:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8423/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pycoder_data:
