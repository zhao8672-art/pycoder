# PyCoder Docker Compose
#
# 启动:  docker compose up -d
# 状态:  curl http://localhost:8423/api/sandbox/status

version: "3.9"

services:
  pycoder-sandbox:
    image: ${PYCODER_DOCKER_IMAGE:-python:3.12-slim}
    container_name: pycoder-sandbox
    command: ["python", "-m", "pycoder.safety.sandbox_executor", "--mode=daemon"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100M
      - /workspace:size=200M
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      - PYCODER_SANDBOX=docker
      - PYCODER_ALLOWED_NETWORK=off
    networks:
      - pycoder-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "python", "-c", "import pycoder.safety.sandbox"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pycoder-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# 文档说明
# ============================================================================
# PyCoder 的代码执行沙箱 Docker 编排. 启动时
# `pycoder/adapters/sandbox_selector.py` 自动检测 Docker 可用性:
# - **可用** → 使用 `docker-compose.yml` 编排的隔离容器
# - **不可用** → 降级到 `subprocess` + 资源限制 (CPU/内存/超时)
#
# 配置 (环境变量):
#   PYCODER_SANDBOX=docker|subprocess  — 强制选择后端
#   PYCODER_DOCKER_IMAGE=python:3.12-slim — 基础镜像
#   PYCODER_DOCKER_REQUIRED=true        — 强制要求 Docker (失败时拒绝降级)
#
# 相关代码:
#   - pycoder/safety/sandbox.py — 沙箱抽象
#   - pycoder/safety/sandbox_executor.py — 执行器实现 (40 KB)
#   - pycoder/adapters/sandbox_selector.py — 自动选择后端
#   - pycoder/server/routers/sandbox_api.py — REST 端点
# ============================================================================
