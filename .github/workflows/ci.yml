name: PyCoder CI

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]

jobs:
    # ===== Python 后端 =====
    lint-python:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with: { python-version: "3.13" }
            - run: pip install flake8 ruff
            - run: flake8 pycoder/ --count --select=E9,F63,F7,F82 --show-source --statistics
            - run: ruff check pycoder/ --output-format=github

    test-python:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ["3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with: { python-version: "${{ matrix.python-version }}" }
            - run: pip install -e ".[dev]"
            - name: Run tests with coverage
              run: |
                  pytest tests/ -v --tb=short --timeout=60 \
                    --cov=pycoder --cov-report=xml --cov-report=term-missing \
                    --cov-fail-under=80
            - name: Upload coverage to Codecov
              if: matrix.python-version == '3.13'
              uses: codecov/codecov-action@v4
              with:
                  files: ./coverage.xml
                  fail_ci_if_error: false

    type-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with: { python-version: "3.13" }
            - run: pip install mypy types-requests types-setuptools
            - run: mypy pycoder/ --ignore-missing-imports --check-untyped-defs || echo "::warning ::mypy found type issues — review recommended"

    security-scan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with: { python-version: "3.13" }
            - name: Install security tools
              run: pip install bandit pip-audit
            - name: Bandit security scan
              run: bandit -r pycoder/ -f json -o bandit-report.json || echo "::warning ::Bandit found issues — review bandit-report.json"
            - name: Pip-audit dependency scan
              run: pip-audit || echo "::warning ::pip-audit found vulnerable dependencies"
            - name: Upload Bandit report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: bandit-report
                  path: bandit-report.json
            - name: Semgrep security scan
              uses: returntocorp/semgrep-action@v1
              with:
                  config: >-
                      p/python
                      p/owasp-top-ten
                      p/bandit

    # ===== Electron 前端 =====
    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with: { node-version: "20" }
            - working-directory: pycoder/electron
              run: |
                  npm ci
                  npm run build
              env:
                  CI: true
