name: PyCoder CI

on:
  push: { branches: [main, master] }
  pull_request: { branches: [main, master] }

jobs:
  # ── 1. 代码质量检查 ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check pycoder/ tests/

  # ── 2. 类型检查 ──
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      - run: mypy pycoder/ --ignore-missing-imports || true

  # ── 3. 安全扫描 ──
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install bandit safety
      - run: bandit -r pycoder/ -f json -o bandit-report.json || true
      - run: safety check --bare || true

  # ── 4. 单元测试 + 覆盖率 ──
  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python-version }}" }
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=pycoder --cov-report=xml --cov-report=term --cov-fail-under=80
      - uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.13'

  # ── 5. 构建验证 ──
  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build --wheel